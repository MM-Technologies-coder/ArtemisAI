<!DOCTYPE html>
<html lang="IT-it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis-AI</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo Artemis-AI" class="logo-image">
            </div>
            <div class="user-profile-icon">
                <i class="fa-jelly fa-regular fa-circle-user"></i> 
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="message-content">
                    <p>Ciao! Sono Artemis, il tuo assistente AI. Come posso aiutarti oggi?</p>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Chiedi qualsiasi cosa..." autocomplete="off">
                <button id="send-btn">
                    <i class="fa-jelly fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>

    <script type="module" src="scripts/index.js"></script>
</body>
</html>
